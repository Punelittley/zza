<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Банкетам.Нет – Часовой режим</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
/* Design tokens */
:root {
  --bg: #ffffff;
  --fg: #111111;
  --accent: #8b5cf6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --fg: #eeeeee;
    --accent: #c026d3;
  }
}
body { background: var(--bg); color: var(--fg); }

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f5f5f7;color:#333;padding:0 20px;max-width:1000px;margin:0 auto;}
header{padding:15px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;margin-bottom:20px;}
header h1{color:#8b5cf6;font-size:20px;}
.hero{background:linear-gradient(to right, #8b5cf6, #c026d3);color:#fff;padding:40px 20px;border-radius:10px;text-align:center;margin-bottom:20px;}
.grid, .requests-grid, .img-blocks{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:20px;}
.card, .form-box{background:#fff;padding:20px;border-radius:10px;border:1px solid #ddd;}
.card h3, .card h4{color:#8b5cf6;margin-bottom:5px;}
.btn{display:inline-block;padding:10px 15px;background:#8b5cf6;color:#fff;border:none;border-radius:6px;cursor:pointer;text-decoration:none;font-weight:600;}
.btn-outline{background:transparent;color:#8b5cf6;border:1px solid #8b5cf6;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;margin-bottom:5px;font-size:14px;}
.form-group input, .form-group select{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;}
.badge{padding:4px 8px;border-radius:12px;font-size:12px;}
.status-Новая{background:#dbeafe;color:#1d4ed8;}
.status-назначен{background:#fef9c3;color:#a16207;}
.status-завершен{background:#dcfce7;color:#166534;}
.img-block{border-radius:10px;overflow:hidden;position:relative;height:180px;}
.img-block img{width:100%;height:100%;object-fit:cover;}
.img-block .img-label{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,.6);color:#fff;padding:10px;}
.slider{height:200px;border-radius:10px;overflow:hidden;position:relative;margin-bottom:20px;}
.slides{display:flex;height:100%;transition:.5s;}
.slide{min-width:100%;background-size:cover;background-position:center;}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;}
.slider-prev{left:10px;} .slider-next{right:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,100px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;transition:.3s;z-index:99;}
#toast.show{transform:translate(-50%,0);}
.auth-links, .form-footer{text-align:center;margin-top:20px;}
.error-hint{color:red;font-size:12px;display:none;}
.has-error .error-hint{display:block;}
    </style>
</head>
<body>
    <header>
        <h1>Банкетам.Нет</h1>
        <nav>
            <a href="login.html" class="btn">Войти</a>
            <a href="register.html" class="btn btn-outline">Регистрация</a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>Идеальный банкет начинается здесь</h2>
            <p>Бронируйте залы, рестораны и веранды в пару кликов</p>
        </section>
        <!-- Оставьте остальное содержимое как в обычной версии – пользователь сможет переключиться на неё через ссылку -->
        <a href="index.html" style="display:block;margin-top:20px;">Обычная версия</a>
    </main>
    <script>
document.addEventListener('DOMContentLoaded', () => {
    // Toast
    const toast = msg => {
        let t = document.getElementById('toast');
        if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };
    // Minimal placeholder – в часовом режиме мы пока не делаем запросы к серверу, просто показываем сообщение
    const lf = document.getElementById('loginForm');
    if (lf) lf.onsubmit = e => { e.preventDefault(); toast('Функция входа недоступна в режиме просмотра'); };
});
    </script>
    <div id="toast"></div>
</body>
</html>
